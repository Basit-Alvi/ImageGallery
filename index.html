<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Image Gallery</h1>
            <!-- Category Filter (Bonus Feature) -->
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">All</button>//button
                <button class="filter-btn" data-category="nature">Nature</button>
                <button class="filter-btn" data-category="urban">Urban</button>
                <button class="filter-btn" data-category="animals">Animals</button>
            </div>
        </header>

        <!-- Gallery Grid -->
        <div class="gallery">
            <div class="gallery-item" data-category="nature">
                <img src="https://picsum.photos/500/400?random=1" alt="Mountain landscape">
                <div class="overlay">
                    <button class="view-btn">View</button>
                </div>
            </div>

            <div class="gallery-item" data-category="urban">
                <img src="https://picsum.photos/500/400?random=2" alt="City lights">
                <div class="overlay">
                    <button class="view-btn">View</button>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <img src="https://picsum.photos/500/400?random=3" alt="Beach sunset">
                <div class="overlay">
                    <button class="view-btn">View</button>
                </div>
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="https://picsum.photos/500/400?random=4" alt="Eagle in flight">
                <div class="overlay">
                    <button class="view-btn">View</button>
                </div>
            </div>

            <div class="gallery-item" data-category="urban">
                <img src="https://picsum.photos/500/400?random=5" alt="Urban architecture">
                <div class="overlay">
                    <button class="view-btn">View</button>
                </div>
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="https://picsum.photos/500/400?random=6" alt="Lion portrait">
                <div class="overlay">
                    <button class="view-btn">View</button>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <img src="https://picsum.photos/500/400?random=7" alt="Forest pathway">
                <div class="overlay">
                    <button class="view-btn">View</button>
                </div>
            </div>

            <div class="gallery-item" data-category="urban">
                <img src="https://picsum.photos/500/400?random=8" alt="Street photography">
                <div class="overlay">
                    <button class="view-btn">View</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <span class="close">&times;</span>
            <button class="prev">&#10094;</button>
            <img id="lightbox-img" src="" alt="">
            <button class="next">&#10095;</button>
            <div class="image-counter">
                <span id="current-image">1</span> / <span id="total-images">8</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
